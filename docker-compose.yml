services:
  postgres:
    image: postgres:16-alpine
    container_name: signup-bonus-assistant-postgres
    environment:
      POSTGRES_DB: signup_bonus_assistant
      POSTGRES_USER: signup_bonus_assistant
      POSTGRES_PASSWORD: signup_bonus_assistant
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signup_bonus_assistant -d signup_bonus_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
